{% extends 'core/base.html' %}
{% block title %}Nueva Tarea - {{ subject.name }}{% endblock %}
{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'core:teacher_subject_list' %}">Materias</a></li>
        <li class="breadcrumb-item"><a href="{% url 'core:teacher_assignment_list' subject.pk %}">{{ subject.name }} - Tareas</a></li>
        <li class="breadcrumb-item active">Nueva Tarea</li>
    </ol>
</nav>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-plus-circle"></i> Crear Tarea - {{ subject.name }}</h4>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_title" class="form-label">Título</label>
                        <input type="text" name="title" id="id_title" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_description" class="form-label">Descripción</label>
                        <textarea name="description" id="id_description" class="form-control" rows="4" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="id_due_date" class="form-label">Fecha de entrega</label>
                        <input type="datetime-local" name="due_date" id="id_due_date" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_file" class="form-label">Archivo adjunto (opcional)</label>
                        <input type="file" name="file" id="id_file" class="form-control">
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'core:teacher_assignment_list' subject.pk %}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Volver
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Crear Tarea
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
